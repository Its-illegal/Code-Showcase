<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Redirecting…</title>
    <script>
      // GitHub Pages SPA redirect.
      // When GitHub Pages serves a 404 for a client-side route, this page
      // saves the full URL in sessionStorage then redirects to the app root
      // (preserving the repo-name segment so project sites work correctly).
      var base =
        location.pathname.split("/")[1]
          ? "/" + location.pathname.split("/")[1]
          : "";
      sessionStorage.setItem("spa-redirect", location.href);
      location.replace(base + "/");
    </script>
  </head>
  <body></body>
</html>
